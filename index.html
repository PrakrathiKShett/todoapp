<!DOCTYPE html>
<html>
<head>
    <title>Pro To-Do App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="phone">

    <!-- Header -->
    <h2>Hello Prakrathi 👋</h2>
    <p class="sub">25 Tasks are pending</p>

    <!-- Search Bar -->
    <div class="search-box">
        <input type="text" placeholder="Search Tasks">
    </div>

    <!-- Ongoing Task Card -->
    <div class="card">
        <p class="small">Ongoing Task</p>
        <h3>Space App Design 🚀</h3>
        <p class="time">10:30 am - 01:30 pm</p>
    </div>

    <!-- Today Tasks -->
    <p class="section-title">Today's Tasks</p>

    <ul id="taskList"></ul>

    <!-- Add Button -->
    <button class="add-btn" onclick="addTask()">+ Add New Task</button>

</div>

<script src="script.js"></script>
</body>
</html>
